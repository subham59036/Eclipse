services:
  postgres:
    image: postgres:18-alpine
    container_name: eclipse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eclipse
      POSTGRES_USER: eclipse
      POSTGRES_PASSWORD: eclipse@1234567890
    ports:
      - "5432:5432"
    volumes:
      - eclipse-postgres-data:/var/lib/postgresql
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eclipse -d eclipse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    container_name: eclipse-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - eclipse-redis-data:/data
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  eclipse-postgres-data:
  eclipse-redis-data: